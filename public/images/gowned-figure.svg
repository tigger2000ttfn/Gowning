<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFBFD"/>
      <stop offset="100%" stop-color="#DBDDE5"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0B83C"/>
      <stop offset="60%" stop-color="#C8102E"/>
      <stop offset="100%" stop-color="#A4123F"/>
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="54" stroke="url(#ring)" stroke-width="4" opacity="0.9"/>

  <!-- HOOD: rounded, drawn-in at the face, flowing into shoulders -->
  <path d="M60 22
           C45 22 37 33 37 49
           C37 57 40 63 45 67
           L46 72
           C40 74 34 79 31 88
           L31 98 C31 100 33 101 35 101
           L85 101 C87 101 89 100 89 98
           L89 88 C86 79 80 74 74 72
           L75 67
           C80 63 83 57 83 49
           C83 33 75 22 60 22 Z"
        fill="url(#suit)" stroke="#C2C4CE" stroke-width="1.5"/>

  <!-- face opening (soft oval, drawstring hood) -->
  <path d="M60 33
           C52 33 47 40 47 49
           C47 58 52 64 60 64
           C68 64 73 58 73 49
           C73 40 68 33 60 33 Z"
        fill="#2B2B30"/>
  <!-- drawstring highlight around the face -->
  <path d="M60 31 C50 31 45 39 45 49 C45 60 51 66 60 66"
        fill="none" stroke="#C2C4CE" stroke-width="1.3" opacity="0.8"/>

  <!-- front ZIP seam -->
  <line x1="60" y1="72" x2="60" y2="101" stroke="#AEB0BC" stroke-width="2" stroke-dasharray="2 2"/>
  <!-- zip pull -->
  <circle cx="60" cy="74" r="2.2" fill="#AEB0BC"/>

  <!-- soft shoulder/seam folds -->
  <path d="M44 78 C42 85 42 93 44 100" fill="none" stroke="#CDCFD8" stroke-width="1.2" opacity="0.7"/>
  <path d="M76 78 C78 85 78 93 76 100" fill="none" stroke="#CDCFD8" stroke-width="1.2" opacity="0.7"/>

  <!-- ARMS with elastic cuffs -->
  <path d="M40 76 C32 80 27 86 25 93 C24 96 26 98 29 97 L38 90"
        fill="url(#suit)" stroke="#C2C4CE" stroke-width="1.5"/>
  <path d="M80 76 C88 80 93 86 95 93 C96 96 94 98 91 97 L82 90"
        fill="url(#suit)" stroke="#C2C4CE" stroke-width="1.5"/>
  <!-- cuff bands -->
  <path d="M26 93 L31 96" stroke="#AEB0BC" stroke-width="2"/>
  <path d="M94 93 L89 96" stroke="#AEB0BC" stroke-width="2"/>
</svg>
