<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0B83C"/><stop offset="60%" stop-color="#C8102E"/><stop offset="100%" stop-color="#A4123F"/>
    </linearGradient>
    <linearGradient id="glove" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFBFD"/><stop offset="100%" stop-color="#D6D8E0"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="54" stroke="url(#ring)" stroke-width="4" opacity="0.9"/>
  <!-- raised hand: palm + 4 fingers + thumb -->
  <g stroke="#C2C4CE" stroke-width="1.6" fill="url(#glove)" stroke-linejoin="round" stroke-linecap="round">
    <!-- palm -->
    <path d="M42 60 L42 84 C42 92 48 98 58 98 L66 98 C76 98 82 91 82 82 L82 64 Z"/>
    <!-- index -->
    <rect x="46" y="34" width="9" height="32" rx="4.5"/>
    <!-- middle -->
    <rect x="56" y="28" width="9" height="38" rx="4.5"/>
    <!-- ring -->
    <rect x="66" y="32" width="9" height="34" rx="4.5"/>
    <!-- pinky -->
    <rect x="75" y="42" width="8" height="26" rx="4"/>
    <!-- thumb -->
    <path d="M42 64 C34 62 28 66 27 72 C26 77 31 80 37 78 L44 74"/>
  </g>
  <!-- cuff band -->
  <path d="M42 90 L82 90" stroke="#A4123F" stroke-width="3" opacity="0.85"/>
</svg>
